<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" type="text/css" href="./style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap"
        rel="stylesheet">

    <title>Frontend Mentor | Order summary card</title>
</head>

<body>
    <div id="main">
        <img src="./images/illustration-hero.svg" alt="Mobile background">

        <div class="summary">
            <h1>Order Summary</h1>
            <p>You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
            <div class="plan-box">
                <img src="./images/icon-music.svg" alt="Music icon">
                <span class="plan-desc">
                    <h3>Annual Plan</h3>
                    <h4>$59.99/year</h4>
                </span>
                <a href="#">Change</a>
            </div>
            <button class="payment-link" href="#">Proceed to Payment</button>
            <a class="cancel-order-link" href="#">Cancel Order</a>
        </div>

    </div>

    <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
        Coded by <a href="#">Josephine Situ</a>.
    </div>
</body>

</html>
